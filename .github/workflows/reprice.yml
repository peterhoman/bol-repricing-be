name: Bol.com BE Repricing (Dreamhouse&Garden)

on:
  schedule:
    # Peter configured this project's Channable import slots identical to the
    # NL project's (confirmed 20 July), so this schedule matches exactly.
    # Matches Channable's 24 daily import slots (07:45-21:15 Amsterdam time,
    # skipping the night when nobody buys anyway), each run ~5 min after its
    # matching Channable slot so fresh prices are ready before the NEXT slot.
    # NOTE: times below are in UTC, converted assuming Amsterdam = CEST
    # (UTC+2, summer time). Shift by -1 hour (i.e. subtract 1 more from the
    # UTC hour) once the Netherlands switches back to CET in autumn.
    - cron: '5 6 * * *'    # 08:05 Amsterdam
    - cron: '35 6 * * *'   # 08:35
    - cron: '5 7 * * *'    # 09:05
    - cron: '35 7 * * *'   # 09:35
    - cron: '5 8 * * *'    # 10:05
    - cron: '35 8 * * *'   # 10:35
    - cron: '5 9 * * *'    # 11:05
    - cron: '35 9 * * *'   # 11:35
    - cron: '5 10 * * *'   # 12:05
    - cron: '35 10 * * *'  # 12:35
    - cron: '5 11 * * *'   # 13:05
    - cron: '35 11 * * *'  # 13:35
    - cron: '5 12 * * *'   # 14:05
    - cron: '5 13 * * *'   # 15:05
    - cron: '35 13 * * *'  # 15:35
    - cron: '5 14 * * *'   # 16:05
    - cron: '5 15 * * *'   # 17:05
    - cron: '35 15 * * *'  # 17:35
    - cron: '35 16 * * *'  # 18:35
    - cron: '5 17 * * *'   # 19:05
    - cron: '35 17 * * *'  # 19:35
    - cron: '20 18 * * *'  # 20:20
    - cron: '50 18 * * *'  # 20:50
    - cron: '20 19 * * *'  # 21:20
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  reprice:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests python-dotenv

      - name: Run repricing iteration
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPO: peterhoman/bol-repricing-be
        run: python src/github_action_reprice.py
